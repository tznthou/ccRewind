name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22.23.0'  # node 22 has a better-sqlite3 prebuild; see electron-smoke.yml
          cache: 'pnpm'

      - name: Setup Python (for node-gyp fallback path)
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript build
        run: pnpm tsc -b

      - name: ESLint
        run: pnpm eslint .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22.23.0'  # node 22 has a better-sqlite3 prebuild; see electron-smoke.yml
          cache: 'pnpm'

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Setup Python (for node-gyp fallback path)
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (ELECTRON_RUN_AS_NODE wrapper)
        run: pnpm test
